<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>En mantenimiento | Agencia IA</title>
  <meta name="description" content="Estamos realizando tareas de mantenimiento. Volvemos enseguida." />
  <meta name="robots" content="noindex" />
  <!-- Tailwind (Play CDN): página autocontenida e independiente del build principal -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              black: '#050505',
              primary: '#6366f1',
              secondary: '#06b6d6',
              accent: '#d946ef',
            },
          },
        },
      },
    };
  </script>
</head>
<body class="bg-brand-black text-slate-200 antialiased min-h-screen flex items-center justify-center px-6">
  <!-- Fondos decorativos -->
  <div class="fixed top-0 left-1/2 -translate-x-1/2 w-[1000px] h-[600px] bg-brand-primary/10 blur-[120px] rounded-full -z-10"></div>
  <div class="fixed bottom-0 right-0 w-[500px] h-[500px] bg-brand-secondary/10 blur-[100px] rounded-full -z-10"></div>

  <main class="max-w-2xl w-full text-center">
    <div class="bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl p-10 md:p-14">
      <div class="inline-flex items-center justify-center w-16 h-16 mb-8 rounded-2xl bg-gradient-to-br from-brand-primary to-brand-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white animate-spin [animation-duration:4s]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
        </svg>
      </div>

      <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-4">
        Estamos en <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-primary via-brand-secondary to-brand-accent">mantenimiento</span>
      </h1>
      <p class="text-slate-400 text-lg leading-relaxed mb-8">
        Estamos mejorando el sitio para ofrecerte una mejor experiencia.
        Volveremos a estar disponibles en breve. Gracias por tu paciencia.
      </p>

      <a href="mailto:hola@agenciaia.com"
         class="inline-block px-6 py-3 bg-brand-primary hover:bg-brand-secondary transition-all duration-300 rounded-lg font-semibold text-white shadow-lg shadow-brand-primary/20">
        Contactar con nosotros
      </a>
    </div>

    <p class="mt-8 text-slate-600 text-sm">© 2026 Agencia IA. Todos los derechos reservados.</p>
  </main>
</body>
</html>
