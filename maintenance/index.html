<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Página autocontenida: sin scripts ni recursos de terceros. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src 'self' data:; form-action 'none'; base-uri 'none'" />
  <title>En mantenimiento | Agencia IA</title>
  <meta name="description" content="Estamos realizando tareas de mantenimiento. Volvemos enseguida." />
  <meta name="robots" content="noindex" />
  <style>
    :root {
      --black: #050505;
      --primary: #6366f1;
      --secondary: #06b6d6;
      --accent: #d946ef;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--black);
      color: #e2e8f0;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .glow {
      position: fixed;
      border-radius: 9999px;
      z-index: -10;
      pointer-events: none;
    }
    .glow--top {
      top: 0; left: 50%; transform: translateX(-50%);
      width: 1000px; height: 600px;
      background: rgba(99, 102, 241, 0.1);
      filter: blur(120px);
    }
    .glow--bottom {
      bottom: 0; right: 0;
      width: 500px; height: 500px;
      background: rgba(6, 182, 214, 0.1);
      filter: blur(100px);
    }
    main { max-width: 42rem; width: 100%; text-align: center; }
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1rem;
      padding: 2.5rem;
    }
    @media (min-width: 768px) { .card { padding: 3.5rem; } }
    .icon-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 4rem; height: 4rem;
      margin-bottom: 2rem;
      border-radius: 1rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
    }
    .icon-box svg {
      width: 2rem; height: 2rem;
      color: #fff;
      animation: spin 4s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-size: 2.25rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 1rem;
      line-height: 1.2;
    }
    @media (min-width: 768px) { h1 { font-size: 3rem; } }
    h1 .gradient {
      background: linear-gradient(to right, var(--primary), var(--secondary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .lead {
      color: #94a3b8;
      font-size: 1.125rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: var(--primary);
      border-radius: 0.5rem;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.2);
      transition: background-color 0.3s ease;
    }
    .btn:hover { background: var(--secondary); }
    .copyright { margin-top: 2rem; color: #475569; font-size: 0.875rem; }
  </style>
</head>
<body>
  <!-- Fondos decorativos -->
  <div class="glow glow--top"></div>
  <div class="glow glow--bottom"></div>

  <main>
    <div class="card">
      <div class="icon-box">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
        </svg>
      </div>

      <h1>Estamos en <span class="gradient">mantenimiento</span></h1>
      <p class="lead">
        Estamos mejorando el sitio para ofrecerte una mejor experiencia.
        Volveremos a estar disponibles en breve. Gracias por tu paciencia.
      </p>

      <a href="mailto:hola@agenciaia.com" class="btn">Contactar con nosotros</a>
    </div>

    <p class="copyright">© 2026 Agencia IA. Todos los derechos reservados.</p>
  </main>
</body>
</html>
