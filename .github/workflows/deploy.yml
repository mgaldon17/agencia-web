name: Desplegar en GitHub Pages

# Despliega automáticamente al hacer push a la rama principal,
# y permite lanzarlo manualmente desde la pestaña Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos mínimos necesarios para publicar en GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues solapados; cancela los que estén en cola.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Construir
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar el sitio
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Desplegar
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
