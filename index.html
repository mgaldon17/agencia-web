<!DOCTYPE html>
<html lang="es" class="scroll-smooth dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Política de seguridad de contenido: limita los orígenes de cada recurso.
       'unsafe-inline' en script-src es necesario por el script anti-FOUC de
       abajo; el resto del JS (incluidos los iconos) se sirve desde 'self'. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; form-action 'none'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'" />
  <title>Recepción WhatsApp 24/7 para clínicas dentales</title>
  <meta name="description" content="Tu clínica responde a cada paciente al instante y le agenda la cita sola, también fuera de horario. Menos llamadas perdidas, menos huecos en la agenda." />
  <!-- Aplica el tema guardado antes de pintar para evitar parpadeo (FOUC).
       Modo noche por defecto si no hay preferencia previa. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('tema');
        document.documentElement.classList.toggle('dark', t ? t === 'oscuro' : true);
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body class="bg-page text-ink antialiased">
  <!-- La interfaz se renderiza de forma modular desde src/main.js -->
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
